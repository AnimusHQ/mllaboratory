name: Feature request
description: Propose a capability, integration, example, or documentation improvement
title: "feature: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please distinguish implemented behavior from roadmap or target-only behavior. Avoid including private deployment details or secrets.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, security, or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed behavior or documentation change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Control Plane
        - Data Plane
        - OpenAPI contracts
        - PostgreSQL migrations
        - Helm / Kubernetes
        - Security / RBAC / audit
        - Local development / demo
        - Documentation
        - SDK / examples
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and risks
      description: Note compatibility, security, migration, or operational risks.
    validations:
      required: false
