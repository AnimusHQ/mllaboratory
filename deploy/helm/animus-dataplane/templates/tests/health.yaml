{{- $repo := .Values.tests.image.repository -}}
{{- $tag := .Values.tests.image.tag -}}
{{- $digest := .Values.tests.image.digest -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "animus-dataplane.fullname" . }}-health-test
  labels:
    {{- include "animus-dataplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health
      image: {{ if $digest }}{{ printf "%s@%s" $repo $digest | quote }}{{ else }}{{ printf "%s:%s" $repo $tag | quote }}{{ end }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -euo pipefail
          curl -fsS http://{{ include "animus-dataplane.fullname" . }}:{{ .Values.service.port }}/healthz >/dev/null
