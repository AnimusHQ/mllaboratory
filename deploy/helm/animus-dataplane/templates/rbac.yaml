{{- if .Values.k8s.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "animus-dataplane.fullname" . }}-dp
  labels:
    {{- include "animus-dataplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: dataplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "animus-dataplane.fullname" . }}-dp
  labels:
    {{- include "animus-dataplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: dataplane
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "animus-dataplane.fullname" . }}-dp
  labels:
    {{- include "animus-dataplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: dataplane
subjects:
  - kind: ServiceAccount
    name: {{ include "animus-dataplane.fullname" . }}-dp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "animus-dataplane.fullname" . }}-dp
{{- end }}
