apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: animus-enforce-signed-digest-images
  annotations:
    policies.kyverno.io/title: Enforce signed digest image references
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: require-digest-pinned-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Images must be digest-pinned (image@sha256:...).
        pattern:
          spec:
            containers:
              - image: "*@sha256:*"
            =(initContainers):
              - image: "*@sha256:*"
            =(ephemeralContainers):
              - image: "*@sha256:*"
    - name: require-cosign-signatures
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "*"
          mutateDigest: false
          required: true
          verifyDigest: true
          attestors:
            - count: 1
              entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github.com/.+/.+/.github/workflows/release-images.yml@refs/(tags|heads)/.+$"
